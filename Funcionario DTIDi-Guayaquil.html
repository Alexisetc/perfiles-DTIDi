function renderApp() {
  document.getElementById('clusters-root').innerHTML = CLUSTERS.map(cl => `
    <div class="mb-14">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-12 h-12 rounded-2xl bg-white shadow-sm border ${cl.border} flex items-center justify-center text-2xl">${cl.icon}</div>
        <div>
          <h2 class="text-2xl font-bold text-slate-800">${esc(cl.title)}</h2>
          <p class="text-sm text-slate-500">${esc(cl.desc)}</p>
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
        ${cl.members.map((m,mi) => renderCard(m, mi, cl)).join('')}
      </div>
    </div>
  `).join('');
}

function avatarStyle(m) { return `background:linear-gradient(135deg,${m.avatarFrom},${m.avatarTo})`; }

function renderCard(m, mi, cl) {
  const photoHtml = m.photo
    ? `<div class="w-14 h-14 rounded-2xl overflow-hidden shadow-md relative" style="${avatarStyle(m)}"><img src="${esc(m.photo)}" alt="${esc(m.name)}" class="w-full h-full object-cover" onerror="this.style.display='none'"><span class="absolute inset-0 flex items-center justify-center text-white text-xl font-bold pointer-events-none" style="z-index:-1">${esc(m.initials)}</span></div>`
    : `<div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white text-xl font-bold shadow-md" style="${avatarStyle(m)}">${esc(m.initials)}</div>`;
  const s2 = m.skills.slice(0,2).map(s=>`<span class="chip bg-slate-50 border border-slate-100 text-slate-500">${esc(s)}</span>`).join('');
  const more = m.skills.length>2 ? `<span class="chip bg-slate-50 border border-slate-100 text-slate-400">+${m.skills.length-2}</span>` : '';
  const gradStops = cl.gradient.replace(/from-/g,'').replace(/to-/g,'').split(' ').map(x=>cssColor(x)).join(',');
  return `
    <div class="card bg-white rounded-2xl border border-slate-200 overflow-hidden cursor-pointer hover:border-indigo-200"
         onclick="openModal('${esc(cl.id)}',${mi})">
      <div class="h-2 w-full" style="background:linear-gradient(to right,${gradStops})"></div>
      <div class="p-6 flex flex-col h-full">
        <div class="flex justify-between items-start mb-4">
          ${photoHtml}
          <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>
        <h3 class="font-bold text-slate-900 text-base leading-snug mb-1">${esc(m.name)}</h3>
        <p class="text-xs text-slate-500 font-medium mb-3">${esc(m.profession)}</p>
        <div class="chip ${cl.bg} ${cl.text} mb-4">${esc(m.role)}</div>
        <div class="flex gap-1 flex-wrap">${s2}${more}</div>
      </div>
    </div>`;
}

const COLOR_MAP = {
  'purple-500':'#a855f7','indigo-600':'#4f46e5','emerald-400':'#34d399','teal-600':'#0d9488',
  'blue-500':'#3b82f6','indigo-500':'#6366f1','orange-400':'#fb923c','rose-500':'#f43f5e',
  'slate-500':'#64748b','gray-700':'#374151'
};
function cssColor(cls) { return COLOR_MAP[cls.trim()] || '#64748b'; }

function openModal(clusterId, mi) {
  const cl = CLUSTERS.find(c=>c.id===clusterId);
  currentMember = cl.members[mi];
  currentTab = 'perfil';
  renderModal(cl);
  const ov = document.getElementById('modal-overlay');
  ov.classList.remove('opacity-0','pointer-events-none');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const ov = document.getElementById('modal-overlay');
  ov.classList.add('opacity-0','pointer-events-none');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

  `;

  document.getElementById('modal-tabs').innerHTML = `
    <button class="tab-btn pb-4 text-sm font-bold border-b-2 ${currentTab==='perfil'?'border-indigo-600 text-indigo-600':'border-transparent text-slate-500 hover:text-slate-800'}" onclick="switchTab('perfil')">Perfil Académico</button>
    <button class="tab-btn pb-4 text-sm font-bold border-b-2 flex items-center gap-1.5 ${currentTab==='episig'?'border-indigo-600 text-indigo-600':'border-transparent text-slate-500 hover:text-slate-800'}" onclick="switchTab('episig')">⚡ Sinergia EpiSIG</button>
    <button class="tab-btn pb-4 text-sm font-bold border-b-2 flex items-center gap-1.5 ${currentTab==='fuentes'?'border-indigo-600 text-indigo-600':'border-transparent text-slate-500 hover:text-slate-800'}" onclick="switchTab('fuentes')">🔗 Fuentes <span class="text-xs bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-full">${m.sources?m.sources.length:0}</span></button>
    <button onclick="closeModal()" class="hidden md:block ml-auto text-slate-300 hover:text-slate-600 self-start mt-1">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  `;
  renderTabContent();
}

function switchTab(tab) {
  currentTab = tab;
  const tabs = document.getElementById('modal-tabs').querySelectorAll('.tab-btn');
  tabs.forEach(btn => {
    const isActive = btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(`'${tab}'`);
    if(isActive) {
      btn.classList.remove('border-transparent','text-slate-500');
      btn.classList.add('border-indigo-600','text-indigo-600');
    } else if(btn.getAttribute('onclick') && btn.getAttribute('onclick').includes('switchTab')) {
      btn.classList.add('border-transparent','text-slate-500');
      btn.classList.remove('border-indigo-600','text-indigo-600');
    }
  });
  renderTabContent();
}

function renderTabContent() {
  const m = currentMember;
  const el = document.getElementById('modal-content');

  if(currentTab === 'perfil') {
    const photoNoteHtml = m.photoNote
      ? `<div class="mb-6 p-3 rounded-lg bg-amber-50 border border-amber-200 text-xs text-amber-800"><strong>Foto:</strong> ${esc(m.photoNote)}</div>`
      : '';
    const pubsHtml = m.publications && m.publications.length > 0
      ? `<section>
          <h3 class="flex items-center gap-2 text-base font-bold text-slate-800 mb-4">📄 Publicaciones Destacadas</h3>
          <ul class="space-y-3">${m.publications.map(p=>`<li class="flex gap-3"><div class="mt-1.5 w-1.5 h-1.5 rounded-full bg-indigo-400 shrink-0"></div><span class="text-sm text-slate-600">${esc(p)}</span></li>`).join('')}</ul>
        </section>`
      : `<div class="p-4 rounded-xl bg-slate-50 text-sm text-slate-500 border border-slate-100">Sin publicaciones indexadas detectadas (perfil técnico-administrativo o ingreso reciente).</div>`;
    const projHtml = m.projects && m.projects.length > 0
      ? `<section>
          <h3 class="flex items-center gap-2 text-base font-bold text-slate-800 mb-4">💼 Proyectos y Roles Destacados</h3>
          <ul class="space-y-3">${m.projects.map(p=>`<li class="flex gap-3"><div class="mt-1.5 w-1.5 h-1.5 rounded-full bg-emerald-400 shrink-0"></div><span class="text-sm text-slate-600 font-medium">${esc(p)}</span></li>`).join('')}</ul>
        </section>`
      : '';
    el.innerHTML = `<div class="space-y-8 anim">
      ${photoNoteHtml}
      <section>
        <h3 class="flex items-center gap-2 text-base font-bold text-slate-800 mb-3">🏆 Trayectoria Profesional</h3>
        <p class="text-slate-600 leading-relaxed text-sm">${esc(m.trajectory)}</p>
      </section>
      ${projHtml}
      ${pubsHtml}
    </div>`;
  } else if(currentTab === 'episig') {
    el.innerHTML = `<div class="anim h-full flex flex-col">
      <div class="bg-gradient-to-br from-indigo-50 to-blue-50 rounded-2xl p-8 border border-indigo-100 flex-grow">
        <h3 class="text-lg font-bold text-indigo-900 mb-4 flex items-center gap-3">⚡ Propuesta de Colaboración</h3>
        <p class="text-indigo-800 leading-relaxed text-sm">${esc(m.collab)}</p>
        <div class="mt-8 pt-6 border-t border-indigo-200/50">
          <p class="text-xs text-indigo-600 font-semibold mb-3 uppercase tracking-wide">Acción sugerida para la reunión:</p>
          <div class="bg-white/60 p-4 rounded-xl text-sm text-slate-700 flex items-start gap-3 shadow-sm">
            <span class="text-indigo-500 shrink-0">→</span>
            <span>Presentar casos de éxito de EpiSIG relacionados con <strong class="text-indigo-900">${esc(m.skills[0])}</strong>${m.skills[1]?' y <strong class="text-indigo-900">'+esc(m.skills[1])+'</strong>':''}.</span>
          </div>
        </div>
      </div>
    </div>`;
  } else if(currentTab === 'fuentes') {
    const sources = m.sources || [];
    el.innerHTML = `<div class="anim space-y-4">
      <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4 text-sm text-emerald-900 mb-2">
        <strong>🛡 Trazabilidad:</strong> Toda la información de este perfil se basa en las ${sources.length} fuentes públicas listadas abajo. Haz clic en cada enlace para verificar directamente.
      </div>
      <ul class="space-y-1">
        ${sources.map((s,i)=>`
          <li>
            <a href="${esc(s.url)}" target="_blank" rel="noreferrer" class="src-link text-sm text-slate-700 hover:text-indigo-700 group">
              <span class="text-xs font-mono text-slate-400 mt-0.5 shrink-0">${String(i+1).padStart(2,'0')}.</span>
              <div class="flex-1 min-w-0">
                <div class="font-medium">${esc(s.label)}</div>
                <div class="text-xs text-slate-400 group-hover:text-indigo-500 truncate">${esc(s.url)}</div>
              </div>
              <svg class="w-4 h-4 text-slate-300 group-hover:text-indigo-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
            </a>
          </li>`).join('')}
      </ul>
      ${sources.length === 0 ? '<div class="p-4 text-sm text-slate-500">Sin fuentes adicionales disponibles.</div>' : ''}
    </div>`;
  }
}
